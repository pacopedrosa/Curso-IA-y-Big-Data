<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistente de Soporte Técnico</title>
  <style>
    /* ── Reset y variables ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #2563eb;
      --primary-dk: #1d4ed8;
      --bg:         #f1f5f9;
      --surface:    #ffffff;
      --bot-bubble: #e0e7ff;
      --user-bubble:#2563eb;
      --text:       #1e293b;
      --text-muted: #64748b;
      --border:     #cbd5e1;
      --radius:     12px;
      --shadow:     0 4px 24px rgba(0,0,0,.08);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Layout principal ──────────────────────────────────────────── */
    .chat-wrapper {
      width: 100%;
      max-width: 780px;
      height: 100dvh;
      max-height: 900px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ── Cabecera ──────────────────────────────────────────────────── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .avatar {
      width: 44px; height: 44px;
      background: rgba(255,255,255,.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    header h1 { font-size: 1rem; font-weight: 600; line-height: 1.2; }
    header p  { font-size: .75rem; opacity: .85; }
    .status-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Área de mensajes ──────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Burbujas de chat ──────────────────────────────────────────── */
    .msg { display: flex; gap: 10px; max-width: 86%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .msg-icon {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .bot  .msg-icon { background: var(--primary); color: #fff; }
    .user .msg-icon { background: #e2e8f0; }

    .bubble {
      padding: 11px 16px;
      border-radius: var(--radius);
      font-size: .92rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bot  .bubble { background: var(--bot-bubble); border-top-left-radius: 4px; }
    .user .bubble { background: var(--user-bubble); color: #fff; border-top-right-radius: 4px; }

    .bubble strong { font-weight: 600; }
    .bubble code {
      background: rgba(0,0,0,.08);
      padding: 1px 5px; border-radius: 4px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: .87em;
    }

    .meta {
      font-size: .68rem;
      color: var(--text-muted);
      margin-top: 3px;
      text-align: right;
    }
    .bot .meta { text-align: left; }

    /* ── Indicador de escritura ────────────────────────────────────── */
    .typing { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
    .typing span {
      width: 8px; height: 8px; background: var(--primary);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    /* ── Chips de preguntas sugeridas ──────────────────────────────── */
    .suggestions {
      padding: 10px 16px 4px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      flex-shrink: 0;
    }
    .chip {
      background: #e0e7ff;
      color: var(--primary);
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: .8rem;
      cursor: pointer;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    .chip:hover { background: #c7d2fe; transform: translateY(-1px); }

    /* ── Barra de entrada ──────────────────────────────────────────── */
    .input-area {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: .92rem;
      font-family: inherit;
      outline: none;
      min-height: 44px;
      max-height: 120px;
      transition: border-color .15s;
      line-height: 1.4;
    }
    #input:focus { border-color: var(--primary); }

    #sendBtn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      width: 46px; height: 46px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }
    #sendBtn:hover  { background: var(--primary-dk); }
    #sendBtn:active { transform: scale(.95); }
    #sendBtn svg { width: 20px; height: 20px; }

    /* ── Pie de página ─────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 6px;
      font-size: .68rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    /* ── Botones de valoración ────────────────────────────────────────────── */
    .rating-btns {
      display: flex;
      gap: 4px;
      margin-top: 5px;
    }
    .rating-btns button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      padding: 2px 9px;
      font-size: .78rem;
      transition: background .15s, border-color .15s;
      line-height: 1.6;
    }
    .rating-btns button:hover { background: #f1f5f9; border-color: #94a3b8; }
    .rating-btns .label {
      font-size: .72rem;
      color: var(--text-muted);
      align-self: center;
      margin-left: 2px;
    }  </style>
</head>
<body>
<div class="chat-wrapper">

  <!-- Cabecera -->
  <header>
    <div class="avatar">🤖</div>
    <div style="flex:1">
      <h1>Asistente de Soporte Técnico</h1>
      <p>Disponible 24/7 · Respuesta inmediata</p>
    </div>
    <div class="status-dot" title="En línea"></div>
  </header>

  <!-- Mensajes -->
  <div id="messages"></div>

  <!-- Sugerencias rápidas -->
  <div class="suggestions" id="suggestions">
    <button class="chip" onclick="sendSuggestion('No tengo internet')">🌐 Sin internet</button>
    <button class="chip" onclick="sendSuggestion('Mi PC va muy lento')">🐌 PC lento</button>
    <button class="chip" onclick="sendSuggestion('Olvidé mi contraseña')">🔑 Contraseña</button>
    <button class="chip" onclick="sendSuggestion('El ordenador no enciende')">💻 No enciende</button>
    <button class="chip" onclick="sendSuggestion('La impresora no funciona')">🖨️ Impresora</button>
    <button class="chip" onclick="sendSuggestion('Creo que tengo un virus')">🦠 Virus</button>
    <button class="chip" onclick="sendSuggestion('ayuda')">❓ Ver temas</button>
  </div>

  <!-- Entrada de texto -->
  <div class="input-area">
    <textarea
      id="input"
      placeholder="Escribe tu consulta..."
      rows="1"
      autocomplete="off"
    ></textarea>
    <button id="sendBtn" title="Enviar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <footer>Asistente Virtual · Proyecto Modelos de IA · 2026</footer>

</div>

<script>
  // ── Configuración ────────────────────────────────────────────────────
  const API_URL    = '/api/chat';
  const SESSION_ID = 'session_' + Math.random().toString(36).slice(2, 10);

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');

  // ── Mensaje de bienvenida ────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    appendBotMessage(
      '¡Hola! 👋 Soy el asistente virtual de soporte técnico.\n\n' +
      'Puedo ayudarte con problemas de red, equipos lentos, contraseñas, ' +
      'impresoras, virus y mucho más.\n\n' +
      '¿En qué puedo ayudarte hoy?'
    );
  });

  // ── Eventos de UI ────────────────────────────────────────────────────
  sendBtn.addEventListener('click', handleSend);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  // Auto-resize del textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // ── Lógica de envío ──────────────────────────────────────────────────
  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text) return;

    appendUserMessage(text);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    const typingId = showTyping();
    sendBtn.disabled = true;

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: SESSION_ID, message: text })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      removeTyping(typingId);
      appendBotMessage(data.response, data.intent, data.confidence);
    } catch (err) {
      removeTyping(typingId);
      appendBotMessage(
        '⚠️ No he podido contactar con el servidor. Verifica que la API esté funcionando.',
        'error', 0
      );
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  function sendSuggestion(text) {
    inputEl.value = text;
    handleSend();
  }

  // ── Construcción de mensajes ─────────────────────────────────────────
  function appendUserMessage(text) {
    const el = document.createElement('div');
    el.className = 'msg user';
    el.innerHTML = `
      <div>
        <div class="bubble">${escHtml(text)}</div>
        <div class="meta">${currentTime()}</div>
      </div>
      <div class="msg-icon">👤</div>
    `;
    messagesEl.appendChild(el);
    scrollBottom();
  }

  function appendBotMessage(text, intent = '', confidence = 0) {
    const el = document.createElement('div');
    el.className = 'msg bot';

    const confLabel = (intent && intent !== 'desconocido' && confidence > 0)
      ? ` · <span title="Confianza del clasificador">${Math.round(confidence * 100)}%</span>`
      : '';

    // Los botones de valoración solo aparecen en respuestas reales (no en el saludo inicial)
    const msgId = intent ? 'msg_' + (++_msgCounter) : null;
    const ratingHtml = msgId
      ? `<div class="rating-btns" id="rating_${msgId}">
           <span class="label">¿Fue útil?</span>
           <button onclick="sendFeedback('${msgId}', 1, this)" title="Sí, fue útil">👍</button>
           <button onclick="sendFeedback('${msgId}', -1, this)" title="No fue útil">👎</button>
         </div>`
      : '';

    el.innerHTML = `
      <div class="msg-icon">🤖</div>
      <div>
        <div class="bubble">${formatMarkdown(escHtml(text))}</div>
        <div class="meta">${currentTime()}${confLabel}</div>
        ${ratingHtml}
      </div>
    `;
    messagesEl.appendChild(el);
    scrollBottom();
  }

  function showTyping() {
    const id = 'typing_' + Date.now();
    const el = document.createElement('div');
    el.className = 'msg bot';
    el.id = id;
    el.innerHTML = `
      <div class="msg-icon">🤖</div>
      <div class="bubble typing"><span></span><span></span><span></span></div>
    `;
    messagesEl.appendChild(el);
    scrollBottom();
    return id;
  }

  function removeTyping(id) {
    document.getElementById(id)?.remove();
  }

  // ── Utilidades ───────────────────────────────────────────────────────
  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function formatMarkdown(html) {
    return html
      // **negrita**
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      // `código`
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      // Emojis y saltos de línea ya son texto plano
      .replace(/\n/g, '<br>');
  }

  function currentTime() {
    return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  }

  function scrollBottom() {
    requestAnimationFrame(() => {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  }

  // ── Sistema de valoración de respuestas ─────────────────────────────────────
  async function sendFeedback(messageId, rating, btn) {
    // Reemplazar botones por confirmación visual inmediatamente
    const container = btn.parentElement;
    container.innerHTML = rating > 0
      ? '<span style="color:#16a34a;font-size:.78rem">\u2705 \u00a1Gracias!</span>'
      : '<span style="color:#64748b;font-size:.78rem">\ud83d\udcdd Registrado</span>';

    // Enviar valoración al servidor (sin bloquear la UI si falla)
    try {
      await fetch(API_FB_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: SESSION_ID, message_id: messageId, rating })
      });
    } catch (_) { /* fallo silencioso: no interrumpir la conversación */ }
  }
</script>
</body>
</html>
